defaults:
  - experiment_config
  - _self_

generations: 250            # 纯 NEAT 训练的进化代数；two_stage 的 stage1 若未单独指定，也会继承这里
trials: 200                 # 每个基因组并行评估的环境数量（VMAS 原生并行环境数）
n_parallel: 300             # 每一轮并行评估多少个基因组；CPU 模式通常对应进程数，GPU 模式对应批评估规模

device: "cuda:3"            # 训练/评估使用的设备，如 `cpu`、`cuda:0`

continuous_actions: True     # 是否使用连续动作；VMAS 当前任务一般应保持为 True

overwrite: False            # 是否忽略已有 checkpoint 重新训练；False 表示从最近检查点续训

render: False               # 是否进入“只渲染不训练”模式；设为 True 后会直接展示已有 checkpoint 的策略结果
save_render: False          # 是否把渲染保存成 mp4；开启时必须同时 render=True
train_render: False         # 训练过程中是否实时渲染；通常关闭，否则训练会明显变慢
show_gen: -1                # 渲染/展示哪一代 checkpoint；-1 表示整个训练过程的全局最优
collect_results: True       # 是否把适应度曲线、最佳个体统计等写入 results/logs

checkpt_freq: 1               # 每隔多少代保存一次 checkpoint
results_dir: null             # 输出目录；为 null 时按任务和参数自动生成目录名
